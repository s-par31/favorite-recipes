
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>🍴 My Favorite Recipes</h1>

        <div class="controls">
            <input
                type="text"
                id="search"
                placeholder="Search recipes..."
            >

            <button id="themeBtn">🌙</button>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to My Kitchen!</h2>
        <p>
            Discover delicious homemade recipes that are easy to make
            and perfect for every occasion.
        </p>
    </section>

    <!-- Recipe Cards -->
    <main>
        <div class="recipes" id="recipeContainer">

            <!-- JavaScript automatically inserts recipe cards here -->

        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Favorite Recipes | Made with ❤️</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
